# Rocky VM tmux overrides
# Use C-g as prefix (nested tmux: earth outer=C-b, rocky inner=C-g)

# ── Prefix ──────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-g
bind C-g send-prefix

# ── Drastic color scheme so you know you're inside the ROCKY tmux ────────
# Earth (outer)  = magenta active border + white-on-purple status
# Rocky (inner)  = bright red active border + black-on-bright-green status

set -g pane-active-border-style 'fg=brightred,bold'
set -g pane-border-style        'fg=colour8'

set -g status-style             'bg=brightgreen,fg=black,bold'
set -g status-left              ' [ROCKY] #[bg=black,fg=brightgreen] #S #[default] '
set -g status-left-length       30

set -g window-status-current-style 'bg=black,fg=brightgreen,bold'
set -g window-status-style         'bg=brightgreen,fg=black'

# Disable hexai status theme on rocky (not installed / not relevant)
set -g status-right              '#[fg=colour8]| %H:%M '
set -g status-right-length       30

# ── Visual bell ─────────────────────────────────────────────────────────
set -g visual-bell off
set -g bell-action any
